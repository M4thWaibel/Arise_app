plugins {
  id 'com.android.library'
  id 'expo-module-gradle-plugin'
}

group = 'com.matwaibel.arise.systemguard'
version = '0.1.0'

android {
  namespace 'com.matwaibel.arise.systemguard'
  defaultConfig {
    minSdkVersion 26
    versionCode 1
    versionName "0.1.0"
  }
  lintOptions {
    abortOnError false
  }
}

dependencies {
  // androidx.core (NotificationCompat) comes from the host app classpath.
}
